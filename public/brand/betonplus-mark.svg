<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="בטון פלוס">
  <title>בטון פלוס</title>
  <!-- cutting disc base (graphite / concrete) -->
  <circle cx="60" cy="60" r="54" fill="#1F2A37"/>
  <!-- segmented diamond-blade rim (steel blue) -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="#2563EB" stroke-width="5" stroke-dasharray="5 7"/>
  <!-- inner disc face -->
  <circle cx="60" cy="60" r="44" fill="#28333F" stroke="#3B4654" stroke-width="1.5"/>
  <!-- the "plus" / precision cut crosshair (safety amber) -->
  <rect x="53" y="24" width="14" height="72" rx="4" fill="#F59E0B"/>
  <rect x="24" y="53" width="72" height="14" rx="4" fill="#F59E0B"/>
  <!-- diamond hub (יהלום) -->
  <rect x="49.5" y="49.5" width="21" height="21" rx="2" transform="rotate(45 60 60)" fill="#2563EB"/>
  <rect x="54" y="54" width="12" height="12" rx="1" transform="rotate(45 60 60)" fill="#EAF1FF"/>
</svg>
